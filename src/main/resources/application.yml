server:
  port: 8080

app:
  strava:
    client-id: ${STRAVA_CLIENT_ID}
    client-secret: ${STRAVA_CLIENT_SECRET}
    redirect-uri: ${STRAVA_REDIRECT_URI}
    scopes:
      - read
      - activity:read_all
  fitbit:
    enabled: ${FITBIT_ENABLED:true}
    client-id: ${FITBIT_CLIENT_ID:}
    client-secret: ${FITBIT_CLIENT_SECRET:}
    redirect-uri: ${FITBIT_REDIRECT_URI:}
    scopes:
      - activity
      - heartrate
      - location
      - profile
